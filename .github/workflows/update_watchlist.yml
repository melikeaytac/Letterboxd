name: Watchlist Guncelle

on:
  schedule:
    # Türkiye saati ile gece 00:00 (UTC'ye göre 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # İstediğin zaman manuel tetikleyebilmen için buton ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Scripti Çalıştır
        run: python update_watchlist.py

      - name: Değişiklikleri GitHub'a Kaydet (Commit)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add movies-data.js tanjutan_watchlist.csv
          git commit -m "🤖 Gece Güncellemesi: Yeni filmler eklendi" || echo "Değişiklik yok"
          git push